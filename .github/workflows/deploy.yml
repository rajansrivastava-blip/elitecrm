name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_META_VERIFY_TOKEN: ${{ secrets.VITE_META_VERIFY_TOKEN }}

      - name: Upload dist to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ~/domains/eliteproinfracrm.in/public_html/dist/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Upload package files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: package.json package-lock.json
          remote_path: ~/domains/eliteproinfracrm.in/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install production dependencies & restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            DROOT=~/domains/eliteproinfracrm.in/public_html
            mkdir -p $DROOT/dist
            cd $DROOT
            npm ci --omit=dev
            # Copy frontend files flat so LiteSpeed serves them directly
            cp dist/index.html index.html
            cp -r dist/assets/. assets/
            # Restart Node.js (kills old process, starts new one for API routes)
            # Signal Passenger to restart the Node.js app
            mkdir -p tmp && touch tmp/restart.txt
            echo "Deployment complete at $(date)"
